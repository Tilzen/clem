name: e2e

# End-to-end provisioning test. Runs on a fresh Ubuntu runner that already
# has systemd + useradd, so the runner itself IS the target host. Checks the
# contract clem provision writes: OS user, systemd units, runner.sh content,
# pre-push hook, git signing config, .env permissions.
#
# Does not invoke claude or opencode - the runtime-install step downloads the
# CLI but we don't exercise it. Scope boundary: we verify what clem writes to
# disk, not what agents do at runtime.
#
# No untrusted GitHub Actions context is interpolated into run: steps - all
# variables are either hardcoded or from GITHUB_WORKSPACE (safe).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Pinned for determinism (matches ci.yml). The provisioned hook itself
  # forces LC_ALL=C internally, so assertions here don't depend on locale.
  LANG: "C.UTF-8"

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install runtime deps (tmux, age, sops, yq, python3)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tmux age python3 python3-pip
          sudo curl -sSL -o /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.amd64
          sudo chmod +x /usr/local/bin/sops
          sudo curl -sSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          sops --version | head -1
          yq --version
          age --version

      - name: Build clem
        run: |
          go build -o clem .
          ./clem --help | head -5

      - name: Prepare test project
        run: |
          mkdir -p /tmp/e2e && cd /tmp/e2e
          cat > clem.yaml <<'EOF'
          project: e2etest
          coordination:
            backend: discord
            server_id: "1"
            channels:
              general: "2"
              alerts:  "3"
              lessons: "4"
          agents:
            lead:
              name: "E2ELead"
              role: "tester"
              model: "claude-sonnet-4-6"
              iteration: 5m
              subagent_model: "claude-sonnet-4-6"
              vaults: [github]
          EOF
          "$GITHUB_WORKSPACE/clem" vault init
          "$GITHUB_WORKSPACE/clem" vault set github GH_TOKEN=ghfakefortestingonly

      - name: Run clem provision
        run: |
          cd /tmp/e2e
          sudo -E "$GITHUB_WORKSPACE/clem" provision 2>&1 | tee /tmp/provision.log
          tail -20 /tmp/provision.log

      - name: Assert - OS user created
        run: id e2etest-lead

      - name: Assert - home dir mode 0750
        run: |
          mode=$(stat -c %a /home/e2etest-lead)
          [ "$mode" = "750" ] || { echo "home mode=$mode, want 750"; exit 1; }

      - name: Assert - systemd unit installed + parses
        run: |
          sudo test -f /etc/systemd/system/clem-e2etest-lead.service
          sudo systemd-analyze verify /etc/systemd/system/clem-e2etest-lead.service

      - name: Assert - runner.sh present + valid bash + contains key exports
        run: |
          path=/home/e2etest-lead/.local/bin/clem-runner.sh
          sudo test -x "$path"
          sudo bash -n "$path"
          sudo grep -q 'CLAUDE_CODE_SUBAGENT_MODEL="claude-sonnet-4-6"' "$path"
          sudo grep -q 'timeout 7200' "$path"
          sudo grep -q 'tmux send-keys' "$path"

      - name: Assert - pre-push hook installed + valid bash + four passes present
        run: |
          hook=/home/e2etest-lead/.config/git/hooks/pre-push
          sudo test -x "$hook"
          sudo bash -n "$hook"
          sudo grep -q 'ghp_' "$hook"            # Pass 1: literal secret patterns
          sudo grep -q 'base64 -d' "$hook"       # Pass 2: base64 decode
          sudo grep -q 'unicode_traps' "$hook"   # Pass 3: unicode traps
          sudo grep -q 'code_patterns' "$hook"   # Pass 4: code-scan

      - name: Assert - git signing configured + allowed_signers present
        run: |
          sudo test -f /home/e2etest-lead/.ssh/allowed_signers
          # ConfigureGit writes "<username>@clem <pubkey>" as the allowed-signers line
          sudo grep -q "e2etest-lead@clem ssh-ed25519" /home/e2etest-lead/.ssh/allowed_signers
          sudo grep -q 'signingkey' /home/e2etest-lead/.gitconfig
          sudo grep -q 'gpgsign = true' /home/e2etest-lead/.gitconfig
          sudo grep -q 'format = ssh' /home/e2etest-lead/.gitconfig

      - name: Assert - .env permissions 0600
        run: |
          sudo test -f /home/e2etest-lead/.env
          mode=$(sudo stat -c %a /home/e2etest-lead/.env)
          [ "$mode" = "600" ] || { echo ".env mode=$mode, want 600"; exit 1; }

      - name: Assert - SSH key pair generated
        run: |
          sudo test -f /home/e2etest-lead/.ssh/id_ed25519
          sudo test -f /home/e2etest-lead/.ssh/id_ed25519.pub

      - name: Assert - global gitignore blocks secrets
        run: |
          ignore=/home/e2etest-lead/.gitignore_global
          sudo test -f "$ignore"
          sudo grep -q '^\.env$' "$ignore"
          sudo grep -q '^secrets.sops.yaml$' "$ignore"

      - name: Assert - idempotent provision
        run: |
          cd /tmp/e2e
          sudo -E "$GITHUB_WORKSPACE/clem" provision 2>&1 | tail -5
          count=$(sudo grep -c signingkey /home/e2etest-lead/.gitconfig)
          [ "$count" = "1" ] || { echo "gitconfig has $count signingkey lines after second provision, want 1"; exit 1; }

  egress-containment:
    # End-to-end test of Phase 1 hard egress containment (pipelock + nftables
    # UID firewall). Unit tests prove the GENERATED ruleset is correct; this
    # job proves the ruleset actually CONTAINS a process in the kernel — the
    # security claim that cannot be unit-tested. A pipelock shim stands in for
    # the real binary so the job needs no network download.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install deps (nftables, tmux, age, sops, yq, python3)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nftables tmux age python3
          sudo curl -sSL -o /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.amd64
          sudo chmod +x /usr/local/bin/sops
          sudo curl -sSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install pipelock shim
        # Stands in for the pinned pipelock release so InstallPipelock's version
        # check skips the download and the systemd unit has something to run.
        # `run` listens on 127.0.0.1:8888 so the loopback→proxy probe succeeds.
        run: |
          sudo tee /usr/local/bin/pipelock >/dev/null <<'SH'
          #!/bin/bash
          case "$1" in
            --version|version) echo "pipelock 2.5.0" ;;
            run) exec python3 -m http.server 8888 --bind 127.0.0.1 ;;
            *) exit 0 ;;
          esac
          SH
          sudo chmod +x /usr/local/bin/pipelock

      - name: Build clem
        run: go build -o clem .

      - name: Prepare egress-enabled project
        run: |
          mkdir -p /tmp/eg && cd /tmp/eg
          cat > clem.yaml <<'EOF'
          project: egtest
          coordination:
            backend: discord
            server_id: "1"
            channels: {general: "2", alerts: "3"}
          egress:
            enabled: true
            posture: strict
            domains: ["*.anthropic.com", "github.com"]
          agents:
            lead:
              name: "EgLead"
              model: "claude-sonnet-4-6"
              iteration: 5m
              web_terminal_port: 7681
              vaults: [github]
          EOF
          "$GITHUB_WORKSPACE/clem" vault init
          "$GITHUB_WORKSPACE/clem" vault set github GH_TOKEN=ghfakefortestingonly

      - name: Run clem provision
        run: |
          cd /tmp/eg
          sudo -E "$GITHUB_WORKSPACE/clem" provision 2>&1 | tee /tmp/eg-provision.log
          tail -25 /tmp/eg-provision.log

      - name: Assert - egress artifacts written
        run: |
          sudo test -f /etc/clem/pipelock-egtest.yaml
          sudo grep -q 'mode: strict' /etc/clem/pipelock-egtest.yaml
          sudo grep -q 'enabled: false' /etc/clem/pipelock-egtest.yaml   # tls_interception (CONNECT-only)
          sudo grep -q '"\*.anthropic.com"' /etc/clem/pipelock-egtest.yaml
          nft=/etc/clem/clem-egress-egtest.nft
          sudo test -f "$nft"
          sudo grep -q 'meta skuid .* reject with icmpx' "$nft"
          sudo grep -q 'tcp sport 7681 ct state established,related accept' "$nft"   # B2: ttyd-scoped
          ! sudo grep -qE 'meta skuid [0-9]+ ct state established' "$nft"            # B2: no blanket allow

      - name: Assert - systemd units installed + parse + fail-closed dep
        run: |
          sudo systemd-analyze verify /etc/systemd/system/clem-pipelock-egtest.service
          sudo systemd-analyze verify /etc/systemd/system/clem-nftables-egtest.service
          sudo grep -q 'Requires=clem-nftables-egtest.service' /etc/systemd/system/clem-egtest-lead.service
          sudo grep -q 'export HTTPS_PROXY=http://127.0.0.1:8888' /home/egtest-lead/.local/bin/clem-runner.sh

      - name: Assert - firewall + proxy active after provision
        run: |
          sudo nft list table inet clem_egress_egtest >/dev/null
          systemctl is-active clem-nftables-egtest.service
          systemctl is-active clem-pipelock-egtest.service

      - name: Assert - live containment (the security claim)
        run: |
          # This step deliberately runs commands expected to FAIL (blocked egress)
          # and inspects their exit codes, so disable errexit — otherwise the first
          # correctly-blocked probe (curl exits 6, DNS unresolvable) would abort the
          # step before chk records it. The final `exit $fail` enforces the result.
          set +e
          # Start a rogue + ttyd listener as the agent to test the B2 sport scoping.
          sudo -u egtest-lead bash -c 'nohup python3 -m http.server 7681 --bind 127.0.0.1 >/tmp/l7681 2>&1 &' || true
          sudo -u egtest-lead bash -c 'nohup python3 -m http.server 9999 --bind 127.0.0.1 >/tmp/l9999 2>&1 &' || true
          sleep 2
          fail=0
          chk() { # label expect(BLOCK|ALLOW) rc
            if [ "$2" = BLOCK ]; then [ "$3" -ne 0 ] && echo "PASS [$2] $1" || { echo "FAIL [$2 succeeded] $1"; fail=1; }
            else [ "$3" -eq 0 ] && echo "PASS [$2] $1" || { echo "FAIL [$2 blocked] $1"; fail=1; }; fi; }
          sudo -u egtest-lead curl -s --max-time 6 https://example.com >/dev/null 2>&1; chk "direct internet HTTPS" BLOCK $?
          sudo -u egtest-lead curl -s --max-time 6 https://1.1.1.1 >/dev/null 2>&1;     chk "raw-IP HTTPS (no DNS)" BLOCK $?
          sudo -u egtest-lead timeout 6 bash -c 'echo > /dev/tcp/93.184.216.34/443' 2>/dev/null; chk "arbitrary outbound TCP" BLOCK $?
          sudo -u egtest-lead curl -s --max-time 6 http://127.0.0.1:8888/ >/dev/null 2>&1; chk "loopback to proxy :8888" ALLOW $?
          curl -s --max-time 5 http://127.0.0.1:7681/ >/dev/null 2>&1; chk "B2 ttyd reply (sport 7681)" ALLOW $?
          curl -s --max-time 5 http://127.0.0.1:9999/ >/dev/null 2>&1; chk "B2 rogue reply (sport 9999)" BLOCK $?
          exit $fail

  sample-container:
    # Separate job: verify samples/Dockerfile builds AND a container actually
    # boots into systemd (catches issue #42 class - CMD misconfigured, init
    # missing, --systemd=always incompatibility). Doesn't exercise provision
    # inside the container; the provision job above covers that contract on
    # the bare runner.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build clem binary
        run: go build -o clem .

      - name: Build sample image (ollama flavour)
        run: |
          podman build \
            --build-arg SAMPLE=ollama-gemma4 \
            -t clem-sample-e2e \
            -f samples/Dockerfile .

      - name: Boot container with systemd + wait for it to be up
        id: boot
        run: |
          cid=$(podman run -d --systemd=always --name clem-sample-boot clem-sample-e2e)
          echo "cid=$cid" >> "$GITHUB_OUTPUT"
          # Give systemd up to 30s to reach a running state
          for i in $(seq 1 30); do
            if podman exec "$cid" systemctl is-system-running --wait 2>/dev/null; then
              echo "systemd up after ${i}s"
              exit 0
            fi
            state=$(podman exec "$cid" systemctl is-system-running 2>/dev/null || echo starting)
            echo "wait $i/30 state=$state"
            sleep 1
          done
          echo "::error::systemd did not reach running state; container state:"
          podman inspect "$cid" --format '{{.State.Status}}: {{.State.Error}}'
          podman logs "$cid" | tail -40
          exit 1

      - name: Assert - clem binary runs inside container
        run: podman exec clem-sample-boot clem --help | head -3

      - name: Assert - systemd reachable, not-dead
        run: |
          podman exec clem-sample-boot systemctl is-system-running 2>/dev/null | grep -qE 'running|degraded'

      - name: Cleanup
        if: always()
        run: podman rm -f clem-sample-boot 2>/dev/null || true

  github-coordination:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install runtime deps (tmux, age, sops, yq, python3)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tmux age python3 python3-pip
          sudo curl -sSL -o /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.amd64
          sudo chmod +x /usr/local/bin/sops
          sudo curl -sSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Build clem
        run: go build -o clem .

      - name: Prepare GitHub coordination project
        run: |
          mkdir -p /tmp/gh && cd /tmp/gh
          cat > clem.yaml <<'EOF'
          project: ghtest
          coordination:
            backend: github
            github_repo: acme/tasks
            channels:
              tasks: "clem:todo"
              alerts: "12"
              lessons: "34"
          agents:
            lead:
              name: "GHLead"
              role: "tester"
              model: "claude-sonnet-4-6"
              iteration: 5m
              vaults: [github]
          EOF
          "$GITHUB_WORKSPACE/clem" vault init
          "$GITHUB_WORKSPACE/clem" vault set github GH_TOKEN=ghfakefortestingonly

      - name: Run clem provision
        run: |
          cd /tmp/gh
          sudo -E "$GITHUB_WORKSPACE/clem" provision 2>&1 | tee /tmp/gh-provision.log
          tail -20 /tmp/gh-provision.log

      - name: Assert - GitHub watch sidecar installed
        run: |
          watch=/home/ghtest-lead/.local/bin/clem-github-watch.sh
          sudo test -x "$watch"
          sudo bash -n "$watch"
          sudo grep -q 'api.github.com/repos/' "$watch"
          sudo grep -q 'If-None-Match' "$watch"
          sudo grep -q 'tmux send-keys' "$watch"
          sudo test -f /etc/systemd/system/clem-github-watch-ghtest-lead.service
          sudo systemd-analyze verify /etc/systemd/system/clem-github-watch-ghtest-lead.service
          sudo grep -q 'Wants=clem-github-watch-ghtest-lead.service' /etc/systemd/system/clem-ghtest-lead.service
          sudo grep -q 'JoinsNamespaceOf=clem-ghtest-lead.service' /etc/systemd/system/clem-github-watch-ghtest-lead.service

  jira-coordination:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install runtime deps (tmux, age, sops, yq, python3)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tmux age python3 python3-pip
          sudo curl -sSL -o /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.amd64
          sudo chmod +x /usr/local/bin/sops
          sudo curl -sSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Build clem
        run: go build -o clem .

      - name: Prepare Jira coordination project
        run: |
          mkdir -p /tmp/jira && cd /tmp/jira
          cat > clem.yaml <<'EOF'
          project: jiratest
          coordination:
            backend: jira
            jira:
              site: acme.atlassian.net
              project: ENG
              jql_extra: "AND sprint in openSprints()"
            channels:
              tasks: "clem-todo"
              alerts: "OPS-12"
              lessons: "OPS-34"
          agents:
            lead:
              name: "JiraLead"
              role: "tester"
              model: "claude-sonnet-4-6"
              iteration: 5m
              vaults: [jira, github]
          EOF
          "$GITHUB_WORKSPACE/clem" vault init
          "$GITHUB_WORKSPACE/clem" vault set jira JIRA_USERNAME=bot@acme.com
          "$GITHUB_WORKSPACE/clem" vault set jira JIRA_API_TOKEN=fakefortesting

      - name: Run clem provision
        run: |
          cd /tmp/jira
          sudo -E "$GITHUB_WORKSPACE/clem" provision 2>&1 | tee /tmp/jira-provision.log
          tail -20 /tmp/jira-provision.log

      - name: Assert - Jira watch sidecar installed
        run: |
          watch=/home/jiratest-lead/.local/bin/clem-jira-watch.sh
          sudo test -x "$watch"
          sudo bash -n "$watch"
          sudo grep -q '/rest/api/3/search/jql' "$watch"
          sudo grep -q 'sprint in openSprints' "$watch"
          sudo grep -q 'tmux send-keys' "$watch"
          sudo test -f /etc/systemd/system/clem-jira-watch-jiratest-lead.service
          sudo systemd-analyze verify /etc/systemd/system/clem-jira-watch-jiratest-lead.service
          sudo grep -q 'Wants=clem-jira-watch-jiratest-lead.service' /etc/systemd/system/clem-jiratest-lead.service
          runner=/home/jiratest-lead/.local/bin/clem-runner.sh
          sudo grep -q "mcp-atlassian" "$runner"
          sudo grep -q "acme.atlassian.net" "$runner"
