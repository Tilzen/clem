name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Pin the locale so test results do not depend on the runner image's
  # default. The pre-push hook tests must also pass under the C locale
  # (what systemd gives agent sessions) — enforced by a dedicated step.
  LANG: "C.UTF-8"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install sops + age (needed by vault tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y age
          sudo curl -sSL https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.amd64 \
            -o /usr/local/bin/sops
          sudo chmod +x /usr/local/bin/sops
          sops --version | head -1
          age --version

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -v ./...

      - name: go test (C locale)
        # Agent sessions are systemd-spawned with no LANG set (the C locale).
        # The secret-scan hook is exercised by these tests, so they must pass
        # there too — a UTF-8-only pass means a silently dead control in prod.
        run: LANG=C LC_ALL=C go test ./internal/agent/

      - name: go build
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          # Pinned: `latest` made lint results drift with upstream releases,
          # so an unrelated PR could go red when a new linter version shipped.
          # Bump deliberately alongside any new-lint fallout in one PR.
          version: v1.64.8
          args: --timeout=5m
