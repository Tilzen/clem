# Sample clem.yaml — points agents at an Ollama server on the host, running
# Google Gemma 4 in unsloth's QAT (quantization-aware-training) build.
#
# Start Ollama on the host first and pull the model (NOTE the explicit quant tag —
# a bare pull 400s because the repo holds many GGUFs):
#   export OLLAMA_CONTEXT_LENGTH=32768   # claude-code's prompt overflows ollama's 4096 default
#   ollama serve
#   ollama pull hf.co/unsloth/gemma-4-E4B-it-qat-GGUF:UD-Q4_K_XL   # ~5.2 GB
#
# REQUIRES OLLAMA >= 0.30.3 (added the `gemma4` architecture). Older ollama fails
# with "unknown model architecture: gemma4".
#
# Why this model (measured on an RTX 3080, 10 GB):
#   - QAT Q4_0 is smaller (5.2 GB) so the whole model + KV cache stays 100% on GPU
#     even at 128k context — no CPU spill. ~104 tok/s generation.
#   - The 12B QAT spills to ~17% CPU at 32k ctx on a 10 GB card (≈3x slower); E4B is
#     the sweet spot. Bump to the 12B only if you have >12 GB VRAM.
#   - Native function-calling: 5/5 tool calls + 5/5 round-trips, and claude-code
#     wrote+ran a Python script end-to-end in ~18s. See README for the full matrix.
#
# From inside a podman/docker container, the host is reachable via
# host.containers.internal (podman) or host.docker.internal (docker).
# Adjust provider_url if you are running clem directly on the host
# (use http://127.0.0.1:11434 in that case).

project: sample

coordination:
  backend: discord
  server_id: "${DISCORD_SERVER_ID}"
  channels:
    general: "${DISCORD_GENERAL_CHANNEL}"
    tasks:   "${DISCORD_TASKS_CHANNEL}"
    alerts:  "${DISCORD_ALERTS_CHANNEL}"
    lessons: "${DISCORD_LESSONS_CHANNEL}"

agents:
  lead:
    name: "Clementine"
    role: "Lead Software Engineer"
    runtime: claude-code
    model: "hf.co/unsloth/gemma-4-E4B-it-qat-GGUF:UD-Q4_K_XL"  # Gemma 4 E4B QAT, ~5.2 GB, 100% GPU on a 10 GB card
    provider: ollama
    provider_url: "http://host.containers.internal:11434"
    iteration: 30s
    web_terminal_port: 7681
    web_terminal_bind: 0.0.0.0       # safe inside container; host firewall / podman port map is the guard
    vaults: [github, discord-lead]
    prompt: >-
      You are the {{agent.name}} Discord bot. Messages authored by {{agent.name}} in
      #general are your own previous posts — do not respond to yourself.
      Every iteration: read the last 5 messages in #general via mcp__discord-bot__read_messages.
      If a message from a different user addresses you or mentions {{agent.name}}, reply via
      mcp__discord-bot__send_message. Otherwise do nothing. Then run bash: kill $PPID
